# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Avoid JdkImageTransform/jlink failures with compileSdk 34 (use same JDK for Gradle as project).
# If jlink still fails: close Android Studio, delete folder
#   %USERPROFILE%\.gradle\caches\transforms-3
# then reopen and sync.
