AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Doomscrolling study - Phase 11/12 ingestion API (API Gateway -> Lambda -> PostgreSQL)

Parameters:
  AllowedClientIpCidrParam:
    Type: String
    Description: Your public IP in CIDR form (e.g. 1.2.3.4/32) for direct DB access.
    Default: "0.0.0.0/32"
  AllowedClientIpCidrParam2:
    Type: String
    Description: Additional public IP in CIDR form (e.g. 1.2.3.4/32) for direct DB access.
    Default: "0.0.0.0/32"
  DbNameParam:
    Type: String
    Default: doomscrolling
  DbUserParam:
    Type: String
    Default: doom_user
  DbPasswordParam:
    Type: String
    NoEcho: true
  BackupRetentionDaysParam:
    Type: Number
    Default: 0
    Description: RDS automated backup retention in days.
  EnableDeletionProtectionParam:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable deletion protection on the RDS instance.
  AdminTokenParam:
    Type: String
    NoEcho: true
    Default: ""
  SchemaVersionParam:
    Type: String
    Default: "v1"
    Description: Bump to force re-invocation of schema setup custom resource.

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Architectures:
      - x86_64

Conditions:
  DeletionProtectionEnabled: !Equals [!Ref EnableDeletionProtectionParam, "true"]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Sub "${AWS::Region}a"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Sub "${AWS::Region}b"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  S3VpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcId: !Ref Vpc
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PublicRouteTable

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda access to RDS
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS for CloudFormation callbacks
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16
          Description: Allow PostgreSQL within VPC

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PostgreSQL access from Lambda
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref AllowedClientIpCidrParam
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref AllowedClientIpCidrParam2

  PostgresSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Doomscrolling study DB subnets
      SubnetIds:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB

  PostgresInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Engine: postgres
      DBInstanceClass: db.t4g.micro
      AllocatedStorage: 20
      DBName: !Ref DbNameParam
      MasterUsername: !Ref DbUserParam
      MasterUserPassword: !Ref DbPasswordParam
      BackupRetentionPeriod: !Ref BackupRetentionDaysParam
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      DBSubnetGroupName: !Ref PostgresSubnetGroup
      PubliclyAccessible: true
      DeletionProtection: !If [DeletionProtectionEnabled, true, false]

  IngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../server/ingestion
      # BuildMethod=esbuild bundles src/handler.ts to handler.js at the artifact root.
      Handler: handler.handler
      Environment:
        Variables:
          DB_HOST: !GetAtt PostgresInstance.Endpoint.Address
          DB_PORT: !GetAtt PostgresInstance.Endpoint.Port
          DB_NAME: !Ref DbNameParam
          DB_USER: !Ref DbUserParam
          DB_PASSWORD: !Ref DbPasswordParam
          DB_SSL: "true"
          ADMIN_TOKEN: !Ref AdminTokenParam
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PublicSubnetA
          - !Ref PublicSubnetB
      Events:
        Ingest:
          Type: HttpApi
          Properties:
            Path: /ingest
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handler.ts
        Minify: false
        Sourcemap: true
        Target: es2020

  SchemaSetupFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../server/ingestion
      Handler: schemaSetup.handler
      Environment:
        Variables:
          DB_HOST: !GetAtt PostgresInstance.Endpoint.Address
          DB_PORT: !GetAtt PostgresInstance.Endpoint.Port
          DB_NAME: !Ref DbNameParam
          DB_USER: !Ref DbUserParam
          DB_PASSWORD: !Ref DbPasswordParam
          DB_SSL: "true"
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PublicSubnetA
          - !Ref PublicSubnetB
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/schemaSetup.ts
        Minify: false
        Sourcemap: true
        Target: es2020

  SchemaSetupInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SchemaSetupFunction
      Principal: cloudformation.amazonaws.com
      SourceArn: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*

  SchemaSetupCustomResource:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: PostgresInstance
    Properties:
      ServiceToken: !GetAtt SchemaSetupFunction.Arn
      SchemaVersion: !Ref SchemaVersionParam

Outputs:
  IngestionApiUrl:
    Description: HTTP API endpoint base URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  PostgresEndpoint:
    Description: RDS PostgreSQL endpoint (host)
    Value: !GetAtt PostgresInstance.Endpoint.Address

